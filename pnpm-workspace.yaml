packages:
  - "apps/*"
  - "examples/*"
  - "packages/*"

catalogs:
  build:
    "@types/node": "25.6.2"
    "tsdown": "^0.22.0"
    "typescript": "^5.9.3"
    "vite": "8.0.16"
    "vite-plugin-node-polyfills": "0.26.0"
  core:
    "@digitalbazaar/ed25519-signature-2020": "^5.4.0"
    "@digitalbazaar/ed25519-verification-key-2020": "^4.2.0"
    "@digitalbazaar/vc": "^7.3.0"
    "@idos-network/kwil-js": "0.1.3"
    "jsonld-document-loader": "^2.3.0"
    "tiny-invariant": "^1.3.3"
    "tweetnacl": "^1.0.3"
    "web-streams-polyfill": "3.3.3"
    "zod": "4.4.3"

  ethereum:
    "@wagmi/core": "2.22.1"
    "ethers": "^6.16.0"
    "viem": "2.48.11"
    "wagmi": "2.19.5"

  near:
    "@near-wallet-selector/core": "8.10.2"
    "@near-wallet-selector/here-wallet": "8.10.2"
    "@near-wallet-selector/meteor-wallet": "8.10.2"
    "@near-wallet-selector/modal-ui": "8.10.2"
    "near-api-js": "4.0.4"

  preact:
    "@preact/signals": "^2.9.1"
    "preact": "^10.29.2"

  react:
    "@types/react": "^19.2.15"
    "@types/react-dom": "^19.2.3"
    "react": "^19.2.6"
    "react-dom": "^19.2.6"

  react-router:
    "@react-router/dev": "^7.15.1"
    "@react-router/node": "^7.15.1"
    "@react-router/serve": "^7.15.1"
    "@vercel/react-router": "^1.3.0"
    "react-router": "^7.15.1"

  reown:
    "@reown/appkit": "1.7.20"
    "@reown/appkit-adapter-wagmi": "1.7.20"

  stellar:
    "@creit.tech/stellar-wallets-kit": "^1.9.5"
    "@stellar/freighter-api": "^4.1.0"
    "@stellar/stellar-base": "^13.1.0"
    "@stellar/stellar-sdk": "^13.3.0"

  tanstack:
    "@tanstack/query-sync-storage-persister": "^5.100.14"
    "@tanstack/react-query": "^5.100.14"
    "@tanstack/react-query-devtools": "^5.100.14"
    "@tanstack/react-query-persist-client": "^5.72.1"
    "@tanstack/react-router": "^1.170.8"
    "@tanstack/react-router-devtools": "^1.167.0"
    "@tanstack/react-table": "^8.21.3"
    "@tanstack/router-plugin": "^1.168.11"

  testing:
    "vitest": "4.1.5"

  utils:
    "@stablelib/base64": "^2.0.1"
    "@stablelib/binary": "^2.0.1"
    "@stablelib/bytes": "^2.0.1"
    "@stablelib/hex": "^2.0.1"
    "@stablelib/sha256": "^2.0.1"
    "@stablelib/utf8": "^2.1.0"
    "base85": "^3.2.0"
    "borsh": "^2.0.0"
    "bs58": "^6.0.0"
    "es-toolkit": "^1.46.1"
    "qs": "6.15.1"

  xrp:
    "@gemwallet/api": "^3.8.0"
    "ripple-binary-codec": "^2.7.0"
    "ripple-keypairs": "^2.0.0"
    "xrpl": "^4.6.0"
    "xumm": "^1.8.0"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  # Renovate security update: axios@1.15.2
  - axios@1.15.2
  # Renovate security update: vite@8.0.16
  - vite@8.0.16

onlyBuiltDependencies:
  - "@swc/core"
  - "@prisma/engines"
  - tiny-secp256k1
  - protobufjs
  - esbuild
  - msw
  - "@reown/appkit"
  - "@sentry/cli"
  - "blake-hash"
  - "bufferutil"
  - "es5-ext"
  - "keccak"
  - "lefthook"
  - "prisma"
  - "secp256k1"
  - "usb"
  - "utf-8-validate"

overrides:
  # LRU-cache includes now forced dependency to node:diagnostic internal library
  "@idos-network/kwil-js>lru-cache": "11.2.7"
  "path-scurry>lru-cache": "11.2.7"

  # Overrides for security-updates
  axios: ">=1.15.2"
  base-x: ">=3.0.11"
  protobufjs: ">=7.5.5"
  secp256k1: ">=5.0.1"
  lodash: ">= 4.18.0"

  # Since version 11.0 this is ESM only, but there is a nested dependency error, which relies on commonJS import
  "chevrotain": "10.5.0"

  # We are including a lot of those, but we need just this one
  web-streams-polyfill: "3.3.3"

  # Bs58 is broken < 6.0.0 together with vite 8.x
  # but the import is the same
  bs58: "6.0.0"

strictDepBuilds: true
